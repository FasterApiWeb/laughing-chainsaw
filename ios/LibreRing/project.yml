name: LibreRing
options:
  bundleIdPrefix: com.librering
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_OBJC_BRIDGING_HEADER: LibreRing/BLE/OuraProtocol+CommonCrypto.h
    PRODUCT_BUNDLE_IDENTIFIER: com.librering.app
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  LibreRing:
    type: application
    platform: iOS
    sources:
      - path: LibreRing
        excludes:
          - "**/*.h"
    settings:
      base:
        INFOPLIST_FILE: LibreRing/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.librering.app
        CODE_SIGN_ENTITLEMENTS: LibreRing/LibreRing.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIRequiresFullScreen: false
    info:
      path: LibreRing/Info.plist
      properties:
        CFBundleName: LibreRing
        CFBundleDisplayName: LibreRing
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: "LibreRing connects to your Oura Ring to read health data directly, without a subscription."
        NSHealthShareUsageDescription: "LibreRing reads your health data to show trends alongside ring data."
        NSHealthUpdateUsageDescription: "LibreRing writes heart rate, HRV, sleep stages, SpO2, temperature, breathing rate, and activity from your Oura Ring to Apple Health."
        UIBackgroundModes:
          - bluetooth-central
    entitlements:
      path: LibreRing/LibreRing.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.healthkit.background-delivery: true
