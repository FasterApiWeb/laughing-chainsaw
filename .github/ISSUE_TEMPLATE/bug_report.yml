name: Bug Report
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not include `key.hex`, health data, or `.env` contents.**

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web dashboard
        - iOS app
        - Android scaffold
        - Supabase / cloud sync
        - Cloudflare Worker / R2
        - Python RE tools
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Settings
        2. Click Sync Now
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main @ abc1234 or v0.2.0
    validations:
      required: false
