# MkDocs — https://fasterapiweb.github.io/laughing-chainsaw/docs/
site_name: LibreRing
site_description: Open-source Oura Ring client. Your body, your data, no subscription.
site_author: FasterApiWeb
site_url: https://fasterapiweb.github.io/laughing-chainsaw/docs/

repo_name: FasterApiWeb/laughing-chainsaw
repo_url: https://github.com/FasterApiWeb/laughing-chainsaw
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 FasterApiWeb — MIT License

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Getting Started:
      - Architecture: ARCHITECTURE.md
      - Cloud Setup: SETUP_CLOUD.md
      - Deploy to GitHub Pages: DEPLOY.md
  - Development:
      - Contributing: CONTRIBUTING.md
      - Client Guide: CLIENTS.md
      - Backend: BACKEND.md
      - Backend Comparison: BACKEND_COMPARISON.md
  - Protocol:
      - BLE Protocol: protocol.md
  - Project:
      - Legal: legal.md
      - Open Source Checklist: OPEN_SOURCE.md
      - Security Policy: security.md
      - Code of Conduct: code-of-conduct.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FasterApiWeb/laughing-chainsaw
    - icon: fontawesome/solid/globe
      link: https://fasterapiweb.github.io/laughing-chainsaw/
